server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/gestion_audiencias
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

sala:
  service:
    url: http://localhost:8084

logging:
  level:
    com.justicia.audiencia_service: DEBUG
    org.springframework.cloud.openfeign: DEBUG
    feign: DEBUG
