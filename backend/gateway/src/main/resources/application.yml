server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:

        - id: audiencia-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/audiencias/**

        - id: sala-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/salas/**

        - id: autoridad-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/autoridades/**

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"