server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: usuario-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/usuarios/**
        - id: audiencia-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/audiencias/**
        - id: autoridad-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/autoridades/**
        - id: sala-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/salas/**
        - id: distrito-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/distritos/**
      globalcors:
        corsConfigurations:
          "[/**]":
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
logging:
  level:
    org.springframework.cloud.gateway: DEBUG